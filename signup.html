<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">

   <!-- seo basics
————————————————————————————————————————————-->
   <meta name="description" content="Explore modern blogs on technology, fashion, food, wildlife, lifestyle, 
      and digital trends with engaging articles, insights, and creative content from Revominds.">
   <meta name="keywords" content="Modern Blog, Technology, Fashion, Food, Wildlife, 
      Lifestyle, Digital Trends, Blogging, Tech News, Creative Content, Revominds">
   <meta name="author" content="Revominds">

   <!-- browser compatibility
————————————————————————————————————————————-->
   <meta http-equiv="X-UA-Compatible" content="IE=edge">

   <link rel="icon" href="./assets/images/icon.png">

   <title>Sign up - Responsive Multi-page Blog Website</title>

   <!-- vendor css
————————————————————————————————————————————-->
   <link rel="stylesheet" href="./assets/fontawesome/all.min.css">

   <!-- custom css
————————————————————————————————————————————-->
   <link rel="stylesheet" href="./assets/css/styles.css">

</head>

<body>


   <section class="form__section">
      <div class="container form__section-container">
         <h2>Sign Up</h2>
         <div class="alert__message error">
            <p>This is an error message</p>
         </div>

         <form action="" enctype="multipart/form-data">
            <input type="text" name="" placeholder="First Name">
            <input type="text" name="" placeholder="Last Name">
            <input type="text" name="" placeholder="Username">
            <input type="email" name="" placeholder="Email  ">
            <input type="password" name="" placeholder="Create Password ">
            <input type="password" name="" placeholder="Confirm Password">
            <div class="form__control">
               <label for="avatar">User Avatar</label>
               <input type="file" id="avatar" placeholder="User Avatar">
            </div>
            <button type="submit" class="btn">Sign Up →</button>
            <small>Already have an account?
               <a href="signin.html">Sign In →</a>
            </small>
         </form>
      </div>
   </section>


   <!-- vendor js
————————————————————————————————————————————-->
   <script src="./assets/fontawesome/all.min.js"></script>

   <!-- custom js
————————————————————————————————————————————-->
   <script src="./assets/js/load.js"></script>
   <script src="./assets/js/main.js"></script>
</body>

</html>
